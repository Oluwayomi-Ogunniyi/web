<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Explore cutting-edge tech updates, AI in education, and more on this globally inspired tech blog.">
  <title>Tech Horizon Blog</title>
  <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7.20.15/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    /* Dropdown menu styles */
    .dropdown { position: relative; }
    .dropdown-menu {
      display: none;
      position: absolute;
      background-color: #e0fdf8;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      z-index: 10;
      min-width: 120px;
      border-radius: 4px;
      top: 100%;
      left: 0;
    }
    .dropdown.active .dropdown-menu { display: block; }
    .dropdown-menu li {
      padding: 0.5rem 0.75rem;
      cursor: pointer;
      font-size: 0.9rem;
      line-height: 1.5;
    }
    .dropdown-menu li:hover,
    .dropdown-menu li:active {
      background-color: #007f66;
      color: #e5fcfb;
    }

    /* Body background */
    body {
      background: linear-gradient(to bottom, #e6f0fa, #d1fae5);
    }

    /* Preserve whitespace for post excerpts */
    .preserve-whitespace {
      white-space: pre-wrap;
    }

    /* Responsive clipped image */
    .clipped-image {
      transform: scale(0.9);
      transform-origin: top;
      display: block;
    }

    /* Responsive media */
    .responsive-media {
      position: relative;
      padding-bottom: 56.25%; /* 16:9 aspect ratio */
      height: 0;
      overflow: hidden;
    }
    .responsive-media iframe,
    .responsive-media video {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    /* Disclaimer styles */
    .disclaimer {
      width: 100%;
      background-color: #00412d;
      color: #e0fdf8;
      padding: 0.5rem 0;
      font-size: 0.85rem;
      font-weight: 600;
      text-align: center;
      overflow: hidden;
      white-space: nowrap;
      margin-bottom: 0.5rem;
    }
    .disclaimer-text {
      display: inline-block;
      animation: scroll 15s linear infinite;
    }
    @keyframes scroll {
      0% { transform: translateX(100%); }
      100% { transform: translateX(-100%); }
    }

    /* Header container */
    .header-container {
      position: relative;
      padding-right: 2.5rem; /* Space for home icon */
    }

    /* Media queries for mobile */
    @media (max-width: 640px) {
      .dropdown-menu {
        min-width: 100px;
        font-size: 0.8rem;
      }
      .dropdown-menu li {
        padding: 0.4rem 0.6rem;
      }
      .header-logo img {
        height: 3.5rem; /* h-14 */
      }
      .disclaimer {
        font-size: 0.75rem;
        padding: 0.4rem 0;
      }
      .header-container {
        padding-right: 2rem;
      }
    }

    @media (min-width: 641px) and (max-width: 768px) {
      .dropdown-menu {
        min-width: 140px;
      }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect } = React;

    const App = () => {
      const [category, setCategory] = useState("all");
      const [isCategoryOpen, setIsCategoryOpen] = useState(false);
      const [showLoginModal, setShowLoginModal] = useState(false);
      const [loginType, setLoginType] = useState("admin");
      const [username, setUsername] = useState("");
      const [password, setPassword] = useState("");
      const [loginAttempts, setLoginAttempts] = useState(0);
      const [isAccountLocked, setIsAccountLocked] = useState(localStorage.getItem("isLandingAccountLocked") === "true");
      const [posts, setPosts] = useState(JSON.parse(localStorage.getItem("posts")) || [
        { id: 1, category: "AI & Education", title: "How AI is Revolutionizing Classrooms", excerpt: "Explore AI's role in personalized learning.\n\nNew paragraph here.", date: "2025-07-29", media: "", hidden: false },
        { id: 2, category: "Tech Updates", title: "Latest 5G Breakthroughs in 2025", excerpt: "Discover the newest advancements in 5G tech.\n\t- Faster speeds\n\t- Better connectivity", date: "2025-07-28", media: "", hidden: false },
        { id: 3, category: "Innovation", title: "The Future of Quantum Computing", excerpt: "A deep dive into quantum technology.\n\nThis is a new paragraph.\n\t- Tabbed point", date: "2025-07-27", media: "", hidden: false }
      ]);
      const [comments, setComments] = useState(JSON.parse(localStorage.getItem("comments")) || {});
      const [auditLog, setAuditLog] = useState(JSON.parse(localStorage.getItem("auditLog") || "[]"));

      const categories = ["AI & Education", "Tech Updates", "Innovation", "Gadgets"];
      const filteredPosts = category === "all" ? posts.filter(post => !post.hidden) : posts.filter(post => post.category === category && !post.hidden);

      useEffect(() => {
        localStorage.setItem("posts", JSON.stringify(posts));
        localStorage.setItem("comments", JSON.stringify(comments));
        localStorage.setItem("auditLog", JSON.stringify(auditLog.slice(-100)));
      }, [posts, comments, auditLog]);

      useEffect(() => {
        const handleLogoClick = (e) => {
          if (e.ctrlKey) {
            setShowLoginModal(true);
          }
        };
        const logoElement = document.querySelector(".header-logo");
        if (logoElement) {
          logoElement.addEventListener("click", handleLogoClick);
          return () => logoElement.removeEventListener("click", handleLogoClick);
        }
      }, []);

      const logAction = (action, details) => {
        const newLog = { date: new Date().toLocaleString("en-US", { timeZone: "Africa/Lagos" }), action, details };
        setAuditLog([...auditLog, newLog].slice(-100));
      };

      const handleLogin = () => {
        if (isAccountLocked) {
          logAction("Failed Login", `Account locked for ${loginType} login with username "${username}"`);
          alert("Account is locked due to multiple failed attempts. Contact support.");
          return;
        }

        if (loginType === "admin") {
          const defaultAdminUsername = "admin";
          const defaultAdminPassword = "secure2025";

          if (username === defaultAdminUsername && password === defaultAdminPassword) {
            setLoginAttempts(0);
            localStorage.setItem("isAdminLoggedIn", "true");
            logAction("Redirect to Admin Login", `Default admin "${username}" authenticated, redirecting to admin.html`);
            window.location.href = "admin.html";
          } else {
            setLoginAttempts(loginAttempts + 1);
            logAction("Failed Login", `Attempt ${loginAttempts + 1} for default admin login with username "${username}"`);
            alert("Incorrect username or password. Try again.");
            if (loginAttempts + 1 >= 2) {
              setIsAccountLocked(true);
              localStorage.setItem("isLandingAccountLocked", "true");
              logAction("Account Locked", `Landing page account locked for ${loginType} login with username "${username}"`);
              alert("Account locked due to multiple failed attempts. Contact support.");
            }
          }
        } else {
          const devUsername = localStorage.getItem("landingDevUsername") || "devuser";
          const devPassword = localStorage.getItem("landingDevPassword") || "TokillaMonkey25";

          if (username === devUsername && password === devPassword) {
            setLoginAttempts(0);
            localStorage.setItem("isDevLoggedIn", "true");
            logAction("Redirect to Developer Login", `Developer "${username}" authenticated, redirecting to developer.html`);
            window.location.href = "developer.html";
          } else {
            setLoginAttempts(loginAttempts + 1);
            logAction("Failed Login", `Attempt ${loginAttempts + 1} for developer login with username "${username}"`);
            alert("Incorrect username or password. Try again.");
            if (loginAttempts + 1 >= 2) {
              setIsAccountLocked(true);
              localStorage.setItem("isLandingAccountLocked", "true");
              logAction("Account Locked", `Landing page account locked for ${loginType} login with username "${username}"`);
              alert("Account locked due to multiple failed attempts. Contact support.");
            }
          }
        }
      };

      // Post Detail Page
      if (window.location.pathname.startsWith("/post/")) {
        const postId = parseInt(window.location.pathname.split("/post/")[1]);
        const post = posts.find(p => p.id === postId && !p.hidden);
        return (
          <div className="font-sans text-[#115e57] min-h-screen">
            <header className="bg-[#00412d] text-[#e5fcfb] p-2 sm:p-4 shadow-md sticky top-0 z-20">
              <div className="container mx-auto flex flex-col sm:flex-row justify-between items-center space-y-2 sm:space-y-0 header-container">
                <div className="header-logo">
                  <img src="images/The Qlip2.png" alt="Tech Horizon" className="h-12 sm:h-16" />
                </div>
                <nav className="flex flex-col sm:flex-row items-center space-y-2 sm:space-y-0 sm:space-x-6 text-xs sm:text-base">
                  <a href="/" className="hover:text-[#007f66] transition">Home</a>
                  <div className={`dropdown relative ${isCategoryOpen ? "active" : ""}`}>
                    <a href="#categories" className="hover:text-[#007f66] transition flex items-center" onClick={(e) => { e.preventDefault(); setIsCategoryOpen(!isCategoryOpen); }}>
                      Categories <span className="ml-1">&#9662;</span>
                    </a>
                    <ul className="dropdown-menu rounded-lg">
                      <li onClick={() => { setCategory("all"); setIsCategoryOpen(false); window.location.href = "/"; }} className="text-[#115e57] hover:text-[#e5fcfb]">All</li>
                      {categories.map(cat => (
                        <li key={cat} onClick={() => { setCategory(cat); setIsCategoryOpen(false); window.location.href = "/"; }} className="text-[#115e57] hover:text-[#e5fcfb]">{cat}</li>
                      ))}
                    </ul>
                  </div>
                  <a href="#about" className="hover:text-[#007f66] transition">About</a>
                  <a href="#contact" className="hover:text-[#007f66] transition">Contact</a>
                </nav>
                <a href="index.html" className="absolute top-0 right-0 p-2 text-[#e5fcfb] hover:text-[#007f66] transition z-50">
                    <i className="fas fa-home text-xl"></i>
                </a>
              </div>
            </header>
            <div className="container mx-auto px-4 sm:px-6 py-8 sm:py-12">
              {post ? (
                <>
                  <h1 className="text-2xl sm:text-3xl md:text-4xl font-bold text-[#00412d] mb-4">{post.title}</h1>
                  <p className="text-xs sm:text-sm text-[#00412d] mb-4">{post.date} | {post.category}</p>
                  <p className="text-sm sm:text-base text-[#115e57] mb-4 preserve-whitespace">{post.excerpt}</p>
                  {post.media && (
                    <div className="mb-4 responsive-media max-w-full mx-auto">
                      {post.media.match(/\.(mp4|webm|ogg)$/i) ? (
                        <video src={post.media} controls className="rounded-lg" />
                      ) : post.media.includes("youtube.com") ? (
                        <iframe
                          src={post.media.replace("watch?v=", "embed/")}
                          title={post.title}
                          frameBorder="0"
                          allow="autoplay; encrypted-media"
                          allowFullScreen
                          className="rounded-lg"
                        ></iframe>
                      ) : (
                        <img src={post.media} alt={post.title} className="max-w-full h-auto mx-auto object-contain rounded-lg clipped-image" />
                      )}
                    </div>
                  )}
                  <div className="bg-[#e0fdf8] p-4 sm:p-6 rounded-lg shadow-md mt-6 max-w-full sm:max-w-md mx-auto">
                    <h3 className="text-lg sm:text-xl font-semibold text-[#00412d] mb-4">Comments</h3>
                    <div className="mb-4">
                      <textarea
                        placeholder="Type comments here..."
                        onBlur={(e) => {
                          if (e.target.value.trim()) {
                            let commenterName = "Guest";
                            const gmail = prompt("Optional: Enter your Gmail for identification (leave blank for Guest)");
                            if (gmail && gmail.match(/@gmail\.com$/)) {
                              commenterName = gmail.split('@')[0];
                            }
                            const comment = e.target.value.trim();
                            setComments({
                              ...comments,
                              [post.id]: [...(comments[post.id] || []), { name: commenterName, comment, date: new Date().toLocaleString("en-US", { timeZone: "Africa/Lagos" }) }]
                            });
                            logAction("Add Comment", `User "${commenterName}" commented on post "${post.title}"`);
                            e.target.value = "";
                          }
                        }}
                        className="w-full p-2 sm:p-3 border border-[#007f66] rounded-lg focus:outline-none focus:ring-2 focus:ring-[#007f66] transition resize-none text-sm sm:text-base"
                        rows="3"
                      ></textarea>
                    </div>
                    <div className="text-xs sm:text-sm text-[#115e57]">
                      {comments[post.id]?.map((c, i) => (
                        <div key={i} className="border-t pt-2">
                          <strong>{c.name}</strong> ({c.date}): {c.comment}
                        </div>
                      )) || <p className="text-[#115e57]">No comments yet.</p>}
                    </div>
                  </div>
                  <a href="/" className="text-[#007f66] hover:underline mt-4 inline-block text-sm sm:text-base">Back to Posts</a>
                </>
              ) : (
                <div className="text-[#115e57] text-center pt-20 text-sm sm:text-base">Post not found or not available.</div>
              )}
            </div>
            <div className="disclaimer">
              <span className="disclaimer-text">This blog page is a demo and still under maintenance. Content is not yet authentic. Kindly use the Home button to return to The Qlip's official page.</span>
            </div>
            <footer className="py-6 sm:py-8 bg-[#002e22] text-[#e5fcfb] text-center text-xs sm:text-sm">
              <p>&copy; 2025 Tech Horizon. All rights reserved. Last updated: Fri, Aug 15, 2025, 01:36 AM WAT</p>
            </footer>
          </div>
        );
      }

      // Main Blog Page
      return (
        <div className="font-sans text-[#115e57] min-h-screen">
          <header className="bg-[#00412d] text-[#e5fcfb] p-2 sm:p-4 shadow-md sticky top-0 z-20">
            <div className="container mx-auto flex flex-col sm:flex-row justify-between items-center space-y-2 sm:space-y-0 header-container">
              <div className="header-logo">
                <img src="images/The Qlip2.png" alt="Tech Horizon" className="h-12 sm:h-16" />
              </div>
              <nav className="flex flex-col sm:flex-row items-center space-y-2 sm:space-y-0 sm:space-x-6 text-xs sm:text-base">
                <a href="#home" className="hover:text-[#007f66] transition">Home</a>
                <div className={`dropdown relative ${isCategoryOpen ? "active" : ""}`}>
                  <a href="#categories" className="hover:text-[#007f66] transition flex items-center" onClick={(e) => { e.preventDefault(); setIsCategoryOpen(!isCategoryOpen); }}>
                    Categories <span className="ml-1">&#9662;</span>
                  </a>
                  <ul className="dropdown-menu rounded-lg">
                    <li onClick={() => { setCategory("all"); setIsCategoryOpen(false); }} className="text-[#115e57] hover:text-[#e5fcfb]">All</li>
                    {categories.map(cat => (
                      <li key={cat} onClick={() => { setCategory(cat); setIsCategoryOpen(false); }} className="text-[#115e57] hover:text-[#e5fcfb]">{cat}</li>
                    ))}
                  </ul>
                </div>
                <a href="#about" className="hover:text-[#007f66] transition">About</a>
                <a href="#contact" className="hover:text-[#007f66] transition">Contact</a>
              </nav>
              <a href="/index.html" className="absolute top-0 right-0 p-2 text-[#e5fcfb] hover:text-[#007f66] transition">
                <i className="fas fa-home text-xl"></i>
              </a>
            </div>
          </header>
          <section id="home" className="relative h-screen flex items-center justify-center bg-[#e0fdf8]">
            <div className="text-center z-10 px-4">
              <h1 className="text-3xl sm:text-4xl md:text-5xl lg:text-6xl font-bold text-[#00412d] mb-4">Welcome to Tech Horizon</h1>
              <p className="text-base sm:text-lg md:text-xl text-[#115e57] mb-6">Your source for cutting-edge tech insights, AI in education, and global innovations.</p>
              <a href="#posts" className="bg-[#00412d] text-[#e5fcfb] px-4 sm:px-6 py-2 sm:py-3 rounded-full hover:bg-[#007f66] transition text-sm sm:text-base">Explore Posts</a>
            </div>
            <div className="absolute inset-0 bg-[#002e22] opacity-10"></div>
          </section>
          <section id="posts" className="py-8 sm:py-16">
            <div className="container mx-auto px-4 sm:px-6">
              <h2 className="text-2xl sm:text-3xl font-bold text-[#00412d] text-center mb-6 sm:mb-8">Latest Posts</h2>
              <div className="flex flex-wrap justify-center mb-4 sm:mb-6 gap-2">
                <button onClick={() => setCategory("all")} className={`px-3 sm:px-4 py-1 sm:py-2 mx-1 rounded text-xs sm:text-base ${category === "all" ? "bg-[#00412d] text-[#e5fcfb]" : "bg-[#e0fdf8] text-[#115e57]"} hover:bg-[#007f66] hover:text-[#e5fcfb] transition`}>All</button>
                {categories.map(cat => (
                  <button key={cat} onClick={() => setCategory(cat)} className={`px-3 sm:px-4 py-1 sm:py-2 mx-1 rounded text-xs sm:text-base ${category === cat ? "bg-[#00412d] text-[#e5fcfb]" : "bg-[#e0fdf8] text-[#115e57]"} hover:bg-[#007f66] hover:text-[#e5fcfb] transition`}>{cat}</button>
                ))}
              </div>
              <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 sm:gap-6">
                {filteredPosts.map(post => (
                  <div key={post.id} className="bg-[#e0fdf8] rounded-lg shadow-md overflow-hidden hover:shadow-lg transition w-full max-w-sm mx-auto">
                    <div className="p-4 sm:p-6">
                      <h3 className="text-lg sm:text-xl font-semibold text-[#00412d] mb-2">{post.title}</h3>
                      <p className="text-sm sm:text-base text-[#115e57] mb-4 preserve-whitespace">{post.excerpt}</p>
                      <p className="text-xs sm:text-sm text-[#00412d]">{post.date}</p>
                      {post.media && (
                        <div className="mt-2 mb-4 responsive-media">
                          {post.media.match(/\.(mp4|webm|ogg)$/i) ? (
                            <video src={post.media} controls className="rounded-lg" />
                          ) : post.media.includes("youtube.com") ? (
                            <iframe
                              src={post.media.replace("watch?v=", "embed/")}
                              title={post.title}
                              frameBorder="0"
                              allow="autoplay; encrypted-media"
                              allowFullScreen
                              className="rounded-lg"
                            ></iframe>
                          ) : (
                            <img src="images/The Qlip.png" alt={post.title} className="max-w-full h-auto object-contain rounded-lg clipped-image" />
                          )}
                        </div>
                      )}
                      <a href={`/post/${post.id}`} className="text-[#007f66] hover:underline mt-2 inline-block text-sm sm:text-base">Read More</a>
                    </div>
                  </div>
                ))}
                {filteredPosts.length === 0 && <p className="text-[#115e57] col-span-full text-center text-sm sm:text-base">No posts available in this category.</p>}
              </div>
            </div>
          </section>
          <section className="py-8 sm:py-16 bg-[#e0fdf8]">
            <div className="container mx-auto px-4 sm:px-6 text-center">
              <h2 className="text-2xl sm:text-3xl font-bold text-[#00412d] mb-6 sm:mb-8">Tech in Action</h2>
              <div className="max-w-full sm:max-w-3xl mx-auto responsive-media">
                <iframe
                  src="https://www.youtube.com/embed/dQw4w9WgXcQ"
                  title="Tech Demo"
                  frameBorder="0"
                  allow="autoplay; encrypted-media"
                  allowFullScreen
                  className="rounded-lg"
                ></iframe>
              </div>
              <p className="mt-4 text-sm sm:text-base text-[#115e57]"><a href="#posts" className="text-[#007f66] hover:underline">Watch More Tech Videos</a></p>
            </div>
          </section>
          <div className="disclaimer">
            <span className="disclaimer-text">This blog page is a demo and still under maintenance. Content is not yet authentic. Kindly use the Home button to return to The Qlip's official page.</span>
          </div>
          <footer className="py-6 sm:py-8 bg-[#002e22] text-[#e5fcfb] text-center text-xs sm:text-sm">
            <p>&copy; 2025 Tech Horizon. All rights reserved. Last updated: Fri, Aug 15, 2025, 01:36 AM WAT</p>
          </footer>
          {showLoginModal && (
            <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 px-4">
              <div className="bg-[#e0fdf8] p-6 sm:p-8 rounded-lg shadow-xl w-full max-w-xs sm:max-w-md">
                <div className="header-logo mb-4 sm:mb-6 text-center">
                  <img src="images/The Qlip.png" alt="Tech Horizon" className="h-12 sm:h-16 mx-auto" />
                </div>
                <h2 className="text-xl sm:text-2xl font-bold text-[#00412d] mb-4 sm:mb-6 text-center">Login</h2>
                <select
                  value={loginType}
                  onChange={(e) => setLoginType(e.target.value)}
                  className="w-full p-2 sm:p-3 mb-4 border border-[#007f66] rounded-lg focus:outline-none focus:ring-2 focus:ring-[#007f66] transition text-sm sm:text-base"
                  disabled={isAccountLocked}
                >
                  <option value="admin">Admin</option>
                  <option value="developer">Developer</option>
                </select>
                <input
                  type="text"
                  value={username}
                  onChange={(e) => setUsername(e.target.value)}
                  placeholder="Username"
                  className="w-full p-2 sm:p-3 mb-4 border border-[#007f66] rounded-lg focus:outline-none focus:ring-2 focus:ring-[#007f66] transition text-sm sm:text-base"
                  disabled={isAccountLocked}
                />
                <input
                  type="password"
                  value={password}
                  onChange={(e) => setPassword(e.target.value)}
                  placeholder="Password"
                  className="w-full p-2 sm:p-3 mb-4 sm:mb-6 border border-[#007f66] rounded-lg focus:outline-none focus:ring-2 focus:ring-[#007f66] transition text-sm sm:text-base"
                  disabled={isAccountLocked}
                />
                <div className="flex justify-center space-x-3 sm:space-x-4">
                  <button
                    onClick={handleLogin}
                    className="bg-[#00412d] text-[#e5fcfb] px-4 sm:px-6 py-2 sm:py-3 rounded-lg hover:bg-[#007f66] transition disabled:bg-gray-400 text-sm sm:text-base"
                    disabled={isAccountLocked}
                  >
                    Login
                  </button>
                  <button
                    onClick={() => setShowLoginModal(false)}
                    className="bg-[#e0fdf8] text-[#115e57] px-4 sm:px-6 py-2 sm:py-3 rounded-lg border border-[#007f66] hover:bg-[#007f66] hover:text-[#e5fcfb] transition text-sm sm:text-base"
                  >
                    Cancel
                  </button>
                </div>
                {isAccountLocked && (
                  <div className="mt-4 text-center">
                    <p className="text-red-500 mb-2 text-sm sm:text-base">Account is locked due to multiple failed attempts.</p>
                    <p className="text-[#115e57] text-sm sm:text-base">Contact support to unlock.</p>
                  </div>
                )}
              </div>
            </div>
          )}
        </div>
      );
    };

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
