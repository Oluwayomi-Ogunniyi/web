<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Explore cutting-edge tech updates, AI in education, and more on this globally inspired tech blog.">
  <title>Tech Horizon Blog</title>
  <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7.20.15/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    .dropdown { position: relative; }
    .dropdown-menu {
      display: none;
      position: absolute;
      background-color: #e0fdf8;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      z-index: 10;
      min-width: 160px;
      border-radius: 4px;
    }
    .dropdown.active .dropdown-menu { display: block; }
    .dropdown-menu li { padding: 0.5rem 1rem; cursor: pointer; }
    .dropdown-menu li:hover { background-color: #007f66; color: #e5fcfb; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect } = React;

    const App = () => {
      const [category, setCategory] = useState("all");
      const [isCategoryOpen, setIsCategoryOpen] = useState(false);
      const [adminLogin, setAdminLogin] = useState(false);
      const [role, setRole] = useState("admin");
      const [adminUsername, setAdminUsername] = useState("");
      const [adminPassword, setAdminPassword] = useState("");
      const [loginAttempts, setLoginAttempts] = useState(0);
      const [isAccountLocked, setIsAccountLocked] = useState(false);
      const [showAdminPage, setShowAdminPage] = useState(false);
      const [selectedPost, setSelectedPost] = useState(null);

      const categories = ["AI & Education", "Tech Updates", "Innovation", "Gadgets"];
      const [posts, setPosts] = useState([
        { id: 1, category: "AI & Education", title: "How AI is Revolutionizing Classrooms", excerpt: "Explore AI's role in personalized learning.", date: "2025-07-29", media: "" },
        { id: 2, category: "Tech Updates", title: "Latest 5G Breakthroughs in 2025", excerpt: "Discover the newest advancements in 5G tech.", date: "2025-07-28", media: "" },
        { id: 3, category: "Innovation", title: "The Future of Quantum Computing", excerpt: "A deep dive into quantum technology.", date: "2025-07-27", media: "" },
      ]);
      const [comments, setComments] = useState({});

      const filteredPosts = category === "all" ? posts : posts.filter(post => post.category === category);

      // Discreet admin login trigger (Ctrl + click on logo)
      useEffect(() => {
        const handleLogoClick = (e) => {
          if (e.ctrlKey) {
            setAdminLogin(true);
          }
        };
        const logoElement = document.querySelector(".header-logo");
        if (logoElement) {
          logoElement.addEventListener("click", handleLogoClick);
          return () => logoElement.removeEventListener("click", handleLogoClick);
        }
      }, []);

      // Check URL on load to persist admin page
      useEffect(() => {
        if (window.location.pathname === "/admin" || window.location.pathname === "/developer") {
          const isLoggedIn = localStorage.getItem("isLoggedIn") === "true";
          setShowAdminPage(isLoggedIn);
        }
      }, []);

      const handleAdminLogin = () => {
        if (isAccountLocked) {
          alert("Account is locked. Contact the developer to unlock.");
          return;
        }

        const validUsername = "admin";
        const validPassword = "secure2025";

        if (adminUsername === validUsername && adminPassword === validPassword) {
          setLoginAttempts(0);
          setShowAdminPage(true);
          localStorage.setItem("isLoggedIn", "true");
          console.log("Login successful, redirecting...");
          setTimeout(() => {
            window.location.href = role === "developer" ? "/developer" : "/admin";
          }, 100);
        } else {
          setLoginAttempts(loginAttempts + 1);
          alert("Incorrect username or password. Try again.");
          if (loginAttempts + 1 >= 2) {
            setIsAccountLocked(true);
            alert("Account locked due to multiple failed attempts. Contact the developer.");
          }
        }
      };

      const handleLogout = () => {
        setShowAdminPage(false);
        setAdminLogin(false);
        setAdminUsername("");
        setAdminPassword("");
        setLoginAttempts(0);
        setIsAccountLocked(false);
        localStorage.removeItem("isLoggedIn");
        window.location.href = "/";
      };

      // Admin Page
      if ((window.location.pathname === "/admin" && showAdminPage) || (window.location.pathname === "/admin" && localStorage.getItem("isLoggedIn") === "true")) {
        return (
          <div className="min-h-screen bg-[#fff3cd]">
            <header className="bg-[#00412d] text-[#e5fcfb] p-4 shadow-md">
              <div className="container mx-auto flex justify-between items-center">
                <h2 className="text-xl font-bold">Admin Dashboard</h2>
                <button onClick={handleLogout} className="bg-[#007f66] text-[#e0fdf8] px-3 py-1 rounded hover:bg-[#005f4d]">Logout</button>
              </div>
            </header>
            <div className="container mx-auto p-6">
              <h3 className="text-2xl font-semibold text-[#00412d] mb-4">Create New Post</h3>
              <form onSubmit={(e) => {
                e.preventDefault();
                const title = e.target.title.value;
                const excerpt = e.target.excerpt.value;
                const category = e.target.category.value;
                const media = e.target.media.files[0] ? URL.createObjectURL(e.target.media.files[0]) : "";
                const date = new Date().toISOString().split('T')[0];
                setPosts([...posts, { id: posts.length + 1, category, title, excerpt, date, media }]);
                alert("Post created successfully!");
                e.target.reset();
              }} className="bg-[#e0fdf8] p-6 rounded-lg shadow-md">
                <div className="mb-4">
                  <input type="text" name="title" placeholder="Post Title" required className="w-full p-2 border border-[#007f66] rounded" />
                </div>
                <div className="mb-4">
                  <textarea name="excerpt" placeholder="Post Excerpt" required className="w-full p-2 border border-[#007f66] rounded" rows="4"></textarea>
                </div>
                <div className="mb-4">
                  <select name="category" required className="w-full p-2 border border-[#007f66] rounded">
                    <option value="">Select Category</option>
                    {categories.map(cat => <option key={cat} value={cat}>{cat}</option>)}
                  </select>
                </div>
                <div className="mb-4">
                  <input type="file" name="media" accept="image/*,video/*" className="w-full p-2 border border-[#007f66] rounded" />
                </div>
                <button type="submit" className="bg-[#00412d] text-[#e5fcfb] px-4 py-2 rounded hover:bg-[#007f66]">Publish Post</button>
              </form>
              <h3 className="text-2xl font-semibold text-[#00412d] mt-8 mb-4">Existing Posts</h3>
              <ul className="bg-[#e0fdf8] p-6 rounded-lg shadow-md">
                {posts.map(post => (
                  <li key={post.id} className="text-[#115e57] mb-2">
                    <span>{post.title} ({post.category})</span>
                    {post.media && (
                      <div className="ml-2">
                        {post.media.match(/\.(mp4|webm|ogg)$/i) ? (
                          <video src={post.media} controls className="w-32 h-32 object-cover" />
                        ) : (
                          <img src={post.media} alt={post.title} className="w-32 h-32 object-cover" />
                        )}
                      </div>
                    )}
                  </li>
                ))}
              </ul>
            </div>
          </div>
        );
      }

      // Developer Page
      if ((window.location.pathname === "/developer" && showAdminPage) || (window.location.pathname === "/developer" && localStorage.getItem("isLoggedIn") === "true")) {
        return (
          <div className="min-h-screen bg-[#fff3cd]">
            <header className="bg-[#00412d] text-[#e5fcfb] p-4 shadow-md">
              <div className="container mx-auto flex justify-between items-center">
                <h2 className="text-xl font-bold">Developer Dashboard</h2>
                <button onClick={handleLogout} className="bg-[#007f66] text-[#e0fdf8] px-3 py-1 rounded hover:bg-[#005f4d]">Logout</button>
              </div>
            </header>
            <div className="container mx-auto p-6">
              <h3 className="text-2xl font-semibold text-[#00412d] mb-4">Manage Admin Accounts</h3>
              <form onSubmit={(e) => {
                e.preventDefault();
                const id = e.target.id.value;
                const name = e.target.name.value;
                const age = e.target.age.value;
                const address = e.target.address.value;
                const bio = e.target.bio.value;
                const certifications = e.target.certifications.value;
                const qualifications = e.target.qualifications.value;
                alert(`Admin ${name} added with ID ${id}. Contact developer to unlock if locked.`);
                e.target.reset();
              }} className="bg-[#e0fdf8] p-6 rounded-lg shadow-md">
                <div className="mb-4">
                  <input type="text" name="id" placeholder="Admin ID" required className="w-full p-2 border border-[#007f66] rounded" />
                </div>
                <div className="mb-4">
                  <input type="text" name="name" placeholder="Full Name" required className="w-full p-2 border border-[#007f66] rounded" />
                </div>
                <div className="mb-4">
                  <input type="number" name="age" placeholder="Age" required className="w-full p-2 border border-[#007f66] rounded" />
                </div>
                <div className="mb-4">
                  <input type="text" name="address" placeholder="Address" required className="w-full p-2 border border-[#007f66] rounded" />
                </div>
                <div className="mb-4">
                  <textarea name="bio" placeholder="Bio" className="w-full p-2 border border-[#007f66] rounded" rows="3"></textarea>
                </div>
                <div className="mb-4">
                  <input type="text" name="certifications" placeholder="Certifications" className="w-full p-2 border border-[#007f66] rounded" />
                </div>
                <div className="mb-4">
                  <input type="text" name="qualifications" placeholder="Qualifications" className="w-full p-2 border border-[#007f66] rounded" />
                </div>
                <button type="submit" className="bg-[#00412d] text-[#e5fcfb] px-4 py-2 rounded hover:bg-[#007f66]">Add Admin</button>
              </form>
              <h3 className="text-2xl font-semibold text-[#00412d] mt-8 mb-4">Manage Posts</h3>
              <form onSubmit={(e) => {
                e.preventDefault();
                const title = e.target.title.value;
                const excerpt = e.target.excerpt.value;
                const category = e.target.category.value;
                const media = e.target.media.files[0] ? URL.createObjectURL(e.target.media.files[0]) : "";
                const date = new Date().toISOString().split('T')[0];
                setPosts([...posts, { id: posts.length + 1, category, title, excerpt, date, media }]);
                alert("Post created successfully!");
                e.target.reset();
              }} className="bg-[#e0fdf8] p-6 rounded-lg shadow-md mb-6">
                <div className="mb-4">
                  <input type="text" name="title" placeholder="Post Title" required className="w-full p-2 border border-[#007f66] rounded" />
                </div>
                <div className="mb-4">
                  <textarea name="excerpt" placeholder="Post Excerpt" required className="w-full p-2 border border-[#007f66] rounded" rows="4"></textarea>
                </div>
                <div className="mb-4">
                  <select name="category" required className="w-full p-2 border border-[#007f66] rounded">
                    <option value="">Select Category</option>
                    {categories.map(cat => <option key={cat} value={cat}>{cat}</option>)}
                  </select>
                </div>
                <div className="mb-4">
                  <input type="file" name="media" accept="image/*,video/*" className="w-full p-2 border border-[#007f66] rounded" />
                </div>
                <button type="submit" className="bg-[#00412d] text-[#e5fcfb] px-4 py-2 rounded hover:bg-[#007f66]">Publish Post</button>
              </form>
              <h3 className="text-2xl font-semibold text-[#00412d] mt-8 mb-4">Existing Posts</h3>
              <ul className="bg-[#e0fdf8] p-6 rounded-lg shadow-md">
                {posts.map(post => (
                  <li key={post.id} className="text-[#115e57] mb-2">
                    <span>{post.title} ({post.category})</span>
                    {post.media && (
                      <div className="ml-2">
                        {post.media.match(/\.(mp4|webm|ogg)$/i) ? (
                          <video src={post.media} controls className="w-32 h-32 object-cover" />
                        ) : (
                          <img src={post.media} alt={post.title} className="w-32 h-32 object-cover" />
                        )}
                      </div>
                    )}
                    <button onClick={() => { if (confirm(`Delete ${post.title}?`)) setPosts(posts.filter(p => p.id !== post.id)); }} className="ml-4 text-red-500 hover:text-red-700">Delete</button>
                  </li>
                ))}
              </ul>
              <h3 className="text-2xl font-semibold text-[#00412d] mt-8 mb-4">Locked Accounts</h3>
              <p className="text-[#115e57]">Currently locked: {isAccountLocked ? "1 account" : "None"}</p>
              <button onClick={() => { setIsAccountLocked(false); alert("Account unlocked. Notify admin to relogin."); }} className="bg-[#007f66] text-[#e0fdf8] px-4 py-2 rounded hover:bg-[#005f4d] mt-2">Unlock Account</button>
            </div>
          </div>
        );
      }

      // Post Detail Page
      if (window.location.pathname.startsWith("/post/")) {
        const postId = parseInt(window.location.pathname.split("/post/")[1]);
        const post = posts.find(p => p.id === postId);
        if (!post) {
          return <div className="min-h-screen bg-[#fff3cd] text-[#115e57] text-center pt-20">Post not found</div>;
        }
        return (
          <div className="min-h-screen bg-[#fff3cd]">
            <header className="bg-[#00412d] text-[#e5fcfb] shadow-md sticky top-0 z-20">
              <div className="container mx-auto px-4 py-4 flex justify-between items-center">
                <div className="header-logo">
                  <img src="images/The Qlip2.png" alt="Tech Horizon" className="h-24" />
                </div>
                <nav className="flex items-center space-x-6">
                  <a href="/" className="hover:text-[#007f66]">Home</a>
                  <div className={`dropdown relative ${isCategoryOpen ? "active" : ""}`}>
                    <a href="#categories" className="hover:text-[#007f66]" onClick={(e) => { e.preventDefault(); setIsCategoryOpen(!isCategoryOpen); }}>Categories <span>&#9662;</span></a>
                    <ul className="dropdown-menu rounded-lg">
                      {categories.map(cat => (
                        <li key={cat} onClick={() => { setCategory(cat); setIsCategoryOpen(false); window.location.href = "/"; }} className="text-[#115e57] hover:text-[#e5fcfb]">{cat}</li>
                      ))}
                    </ul>
                  </div>
                  <a href="#about" className="hover:text-[#007f66]">About</a>
                  <a href="#contact" className="hover:text-[#007f66]">Contact</a>
                </nav>
              </div>
            </header>
            <div className="container mx-auto px-4 py-8">
              <h1 className="text-3xl font-bold text-[#00412d] mb-4">{post.title}</h1>
              <p className="text-sm text-[#00412d] mb-4">{post.date} | {post.category}</p>
              <p className="text-[#115e57] mb-4">{post.excerpt}</p>
              {post.media && (
                <div className="mb-4">
                  {post.media.match(/\.(mp4|webm|ogg)$/i) ? (
                    <video src={post.media} controls className="w-full max-w-2xl mx-auto" />
                  ) : post.media.includes("youtube.com") ? (
                    <iframe
                      src={post.media.replace("watch?v=", "embed/")}
                      title={post.title}
                      frameBorder="0"
                      allow="autoplay; encrypted-media"
                      allowFullScreen
                      className="w-full max-w-2xl h-96 mx-auto"
                    ></iframe>
                  ) : (
                    <img src={post.media} alt={post.title} className="w-full max-w-2xl mx-auto object-cover" />
                  )}
                </div>
              )}
              <div className="bg-[#e0fdf8] p-4 rounded-lg shadow-md mt-6">
                <h3 className="text-xl font-semibold text-[#00412d] mb-4">Comments</h3>
                <div className="mb-4">
                  <input
                    type="email"
                    placeholder="Login with Gmail to comment..."
                    onBlur={(e) => {
                      if (e.target.value.match(/@gmail\.com$/)) {
                        const name = e.target.value.split('@')[0];
                        const comment = prompt("Enter your comment:");
                        if (comment) {
                          setComments({ ...comments, [post.id]: [...(comments[post.id] || []), { name, comment, date: new Date().toLocaleString() }] });
                          e.target.value = "";
                        }
                      } else {
                        alert("Please use a Gmail address to comment.");
                      }
                    }}
                    className="w-full p-2 border border-[#007f66] rounded"
                  />
                </div>
                <div className="text-sm text-[#115e57]">
                  {comments[post.id]?.map((c, i) => (
                    <div key={i} className="border-t pt-2">
                      <strong>{c.name}</strong> ({c.date}): {c.comment}
                    </div>
                  )) || <p>No comments yet.</p>}
                </div>
              </div>
              <a href="/" className="text-[#007f66] hover:underline mt-4 inline-block">Back to Posts</a>
            </div>
          </div>
        );
      }

      // Main Blog Page
      return (
        <div className="font-sans text-[#115e57]">
          <header className="bg-[#00412d] text-[#e5fcfb] shadow-md sticky top-0 z-20">
            <div className="container mx-auto px-4 py-4 flex justify-between items-center">
              <div className="header-logo">
                <img src="images/The Qlip2.png" alt="Tech Horizon" className="h-24" />
              </div>
              <nav className="flex items-center space-x-6">
                <a href="#home" className="hover:text-[#007f66]">Home</a>
                <div className={`dropdown relative ${isCategoryOpen ? "active" : ""}`}>
                  <a href="#categories" className="hover:text-[#007f66]" onClick={(e) => { e.preventDefault(); setIsCategoryOpen(!isCategoryOpen); }}>Categories <span>&#9662;</span></a>
                  <ul className="dropdown-menu rounded-lg">
                    {categories.map(cat => (
                      <li key={cat} onClick={() => { setCategory(cat); setIsCategoryOpen(false); }} className="text-[#115e57] hover:text-[#e5fcfb]">{cat}</li>
                    ))}
                  </ul>
                </div>
                <a href="#about" className="hover:text-[#007f66]">About</a>
                <a href="#contact" className="hover:text-[#007f66]">Contact</a>
              </nav>
            </div>
          </header>

          <section id="home" className="relative h-screen flex items-center justify-center bg-[#e0fdf8]">
            <div className="text-center z-10">
              <h1 className="text-5xl md:text-6xl font-bold text-[#00412d] mb-4">Welcome to Tech Horizon</h1>
              <p className="text-xl text-[#115e57] mb-6">Your source for cutting-edge tech insights, AI in education, and global innovations.</p>
              <a href="#posts" className="bg-[#00412d] text-[#e5fcfb] px-6 py-3 rounded-full hover:bg-[#007f66] transition">Explore Posts</a>
            </div>
            <div className="absolute inset-0 bg-[#002e22] opacity-10"></div>
          </section>

          <section id="posts" className="py-16 bg-[#fff3cd]">
            <div className="container mx-auto px-4">
              <h2 className="text-3xl font-bold text-[#00412d] text-center mb-8">Latest Posts</h2>
              <div className="flex justify-center mb-6">
                <button onClick={() => setCategory("all")} className={`px-4 py-2 mx-1 rounded ${category === "all" ? "bg-[#00412d] text-[#e5fcfb]" : "bg-[#e0fdf8] text-[#115e57]"} hover:bg-[#007f66] hover:text-[#e5fcfb]`}>All</button>
                {categories.map(cat => (
                  <button key={cat} onClick={() => setCategory(cat)} className={`px-4 py-2 mx-1 rounded ${category === cat ? "bg-[#00412d] text-[#e5fcfb]" : "bg-[#e0fdf8] text-[#115e57]"} hover:bg-[#007f66] hover:text-[#e5fcfb]`}>{cat}</button>
                ))}
              </div>
              <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                {filteredPosts.map(post => (
                  <div key={post.id} className="bg-[#e0fdf8] rounded-lg shadow-md overflow-hidden hover:shadow-lg transition">
                    <div className="p-6">
                      <h3 className="text-xl font-semibold text-[#00412d] mb-2">{post.title}</h3>
                      <p className="text-[#115e57] mb-4">{post.excerpt}</p>
                      <p className="text-sm text-[#00412d]">{post.date}</p>
                      {post.media && (
                        <div className="mt-2">
                          {post.media.match(/\.(mp4|webm|ogg)$/i) ? (
                            <video src={post.media} controls className="w-full h-48 object-cover" />
                          ) : post.media.includes("youtube.com") ? (
                            <iframe
                              src={post.media.replace("watch?v=", "embed/")}
                              title={post.title}
                              frameBorder="0"
                              allow="autoplay; encrypted-media"
                              allowFullScreen
                              className="w-full h-48"
                            ></iframe>
                          ) : (
                            <img src={post.media} alt={post.title} className="w-full h-48 object-cover" />
                          )}
                        </div>
                      )}
                      <a href={`/post/${post.id}`} className="text-[#007f66] hover:underline mt-2 inline-block">Read More</a>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          </section>

          <section className="py-16 bg-[#e0fdf8]">
            <div className="container mx-auto px-4 text-center">
              <h2 className="text-3xl font-bold text-[#00412d] mb-8">Tech in Action</h2>
              <div className="max-w-3xl mx-auto">
                <div className="relative" style={{ paddingBottom: '56.25%' }}>
                  <iframe
                    className="absolute inset-0 w-full h-full"
                    src="https://www.youtube.com/embed/dQw4w9WgXcQ"
                    title="Tech Demo"
                    frameBorder="0"
                    allow="autoplay; encrypted-media"
                    allowFullScreen
                  ></iframe>
                </div>
                <p className="mt-4 text-[#115e57]"><a href="#posts" className="text-[#007f66] hover:underline">Watch More Tech Videos</a></p>
              </div>
            </div>
          </section>

          <footer className="py-8 bg-[#002e22] text-[#e5fcfb] text-center">
            <p>&copy; 2025 Tech Horizon. All rights reserved. Last updated: Wed, Jul 30, 2025, 12:53 PM WAT</p>
          </footer>

          {adminLogin && !showAdminPage && (
            <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
              <div className="bg-[#e0fdf8] p-6 rounded-lg shadow-lg w-full max-w-md">
                <h2 className="text-2xl font-bold text-[#00412d] mb-4">Admin Login</h2>
                <select value={role} onChange={(e) => setRole(e.target.value)} className="w-full p-2 mb-4 border border-[#007f66] rounded">
                  <option value="admin">Admin</option>
                  <option value="developer">Developer</option>
                </select>
                <input
                  type="text"
                  value={adminUsername}
                  onChange={(e) => setAdminUsername(e.target.value)}
                  placeholder="Username"
                  className="w-full p-2 mb-4 border border-[#007f66] rounded"
                />
                <input
                  type="password"
                  value={adminPassword}
                  onChange={(e) => setAdminPassword(e.target.value)}
                  placeholder="Password"
                  className="w-full p-2 mb-4 border border-[#007f66] rounded"
                />
                <button onClick={handleAdminLogin} className="bg-[#00412d] text-[#e5fcfb] px-4 py-2 rounded hover:bg-[#007f66]">
                  Login
                </button>
                <button onClick={() => setAdminLogin(false)} className="ml-2 text-[#115e57] hover:text-[#007f66]">Cancel</button>
              </div>
            </div>
          )}
        </div>
      );
    };

    // Suppress Babel warning (not directly possible, but ensure clean execution)
    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
